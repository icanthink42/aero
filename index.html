<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPI Aerospace Engineering Course Tier List</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>RPI Aerospace Engineering Course Tier List</h1>

    <div class="tier-container">
        <div class="tier-row">
            <div class="tier-label s-tier">S</div>
            <div class="tier-items" data-tier="S"></div>
        </div>
        <div class="tier-row">
            <div class="tier-label a-tier">A</div>
            <div class="tier-items" data-tier="A"></div>
        </div>
        <div class="tier-row">
            <div class="tier-label b-tier">B</div>
            <div class="tier-items" data-tier="B"></div>
        </div>
        <div class="tier-row">
            <div class="tier-label c-tier">C</div>
            <div class="tier-items" data-tier="C"></div>
        </div>
        <div class="tier-row">
            <div class="tier-label d-tier">D</div>
            <div class="tier-items" data-tier="D"></div>
        </div>
        <div class="tier-row">
            <div class="tier-label f-tier">F</div>
            <div class="tier-items" data-tier="F"></div>
        </div>

        <div class="unranked-section">
            <h2>Unranked Courses</h2>
            <div class="unranked-items" data-tier="unranked"></div>
        </div>

        <button class="reset-btn" onclick="resetTierList()">Reset Tier List</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
